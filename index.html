<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hangman Game</title>
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/favicon/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/favicon/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="/favicon/favicon-16x16.png"
    />
  </head>
  <body>
    <div id="app">
      <div class="absolute top-6 right-6">
        <label class="inline-flex items-center cursor-pointer">
          <input
            id="toggleDarkMode"
            type="checkbox"
            value=""
            class="sr-only peer"
          />
          <div
            class="relative w-11 h-6 bg-gray-200 peer-focus:outline-none peer-focus:ring-4 peer-focus:ring-blue-300 dark:peer-focus:ring-blue-800 rounded-full peer dark:bg-gray-700 peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all dark:border-gray-600 peer-checked:bg-indigo-500 dark:peer-checked:bg-blue-600"
          ></div>
          <span
            class="ms-3 text-sm font-medium text-gray-900 dark:text-gray-300"
            >Dark Mode</span
          >
        </label>
      </div>
        <h1 id="logo" class="text-2xl sm:text-4xl md:text-5xl font-bold">
            [ HANGMAN GAME ]
        </h1>
        <div id="game" class="mt-10 flex flex-col items-center">
        <button id="startGame" class="flex justify-center items-center bg-slate-200 dark:bg-indigo-500
        enabled:hover:bg-slate-300
        enabled:dark:hover:bg-indigo-600 rounded-md font-medium px-5 py-2 disabled:opacity-20 disabled:cursor-not-allowed"
        >Start game
        </button>
    </div>
    <script type="module" src="./src/js/main.js"></script>
  </body>
</html>
